name: Build APK Direct

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Prepare Android project
        run: |
          flutter --version
          flutter create --platforms=android --org com.explapp .
          rm -rf test
          flutter pub get

      - name: Force Android SDK 36 compatibility
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" || true
          python3 <<'PYFIX'
          from pathlib import Path
          import os, re

          def patch_file(path: Path):
              if not path.exists():
                  return
              text = path.read_text(errors='ignore')
              text = re.sub(r'compileSdk\s*=\s*flutter\.compileSdkVersion', 'compileSdk = 36', text)
              text = re.sub(r'compileSdkVersion\s+flutter\.compileSdkVersion', 'compileSdkVersion 36', text)
              text = re.sub(r'compileSdk\s*=\s*\d+', 'compileSdk = 36', text)
              text = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 36', text)
              path.write_text(text)

          # Patch app Gradle files created by Flutter.
          for rel in ['android/app/build.gradle', 'android/app/build.gradle.kts']:
              patch_file(Path(rel))

          # Patch Android plugin projects in pub cache, especially file_picker.
          pub_cache = Path(os.environ.get('PUB_CACHE', str(Path.home()/'.pub-cache')))
          if pub_cache.exists():
              for f in pub_cache.rglob('android/build.gradle*'):
                  patch_file(f)
          PYFIX

      - name: Android package and app name
        run: |
          sed -i "s/applicationId = .*/applicationId = \"com.explapp.qamoosi_school\"/" android/app/build.gradle || true
          sed -i "s/applicationId \".*\"/applicationId \"com.explapp.qamoosi_school\"/" android/app/build.gradle || true
          sed -i 's/android:label="[^"]*"/android:label="قاموسي المدرسي"/' android/app/src/main/AndroidManifest.xml || true

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK
        run: flutter build apk --release

      - name: Copy APK
        run: |
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/qamoosi-school.apk
          cat > DOWNLOAD_APK.md <<'EOF'
          # تحميل تطبيق قاموسي المدرسي

          بعد نجاح البناء، رابط APK المباشر داخل المستودع:

          `apk/qamoosi-school.apk`

          أو من GitHub:

          `https://github.com/USER/REPO/raw/main/apk/qamoosi-school.apk`
          EOF

      - name: Commit APK
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Build qamoosi school APK
          file_pattern: apk/qamoosi-school.apk DOWNLOAD_APK.md
